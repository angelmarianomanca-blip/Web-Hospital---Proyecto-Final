<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Web Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

    <main class="hospital-background">
        <div class="door-button-container" id="open-login">
            <div class="door door-left"></div>
            <div class="door door-right"></div>
            <span class="login-text">Entrar al Login</span>
        </div>
    </main>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <button class="close-button" id="close-login">&times;</button>
            
            <div class="login-header">
                <h2>Iniciar Sesión</h2>
            </div>

            <form class="login-form">
                
                <label class="section-label">Selecciona tu Rol:</label>
                <div class="role-selection">
                    <label class="role-option">
                        <input type="radio" name="role" value="medico" checked>
                        <span class="role-card">
                            <span class="role-icon">👨‍⚕️</span>
                            <span class="role-name">Médico</span>
                        </span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="recepcionista">
                        <span class="role-card">
                            <span class="role-icon">👩‍💻</span>
                            <span class="role-name">Recepcionista</span>
                        </span>
                    </label>
                </div>

                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: JuanGomez" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-button">Ingresar al Sistema</button>
            </form>
        </div>
    </div>

    
</body>
</html>
